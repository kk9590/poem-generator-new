<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chance Verse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Chance Verse</h1>
    <p class="author">宇尽咸</p>
    <div id="controls">
        <button id="goButton">GO</button>
        <button id="filterButton">SET</button>
    </div>
    <div id="filterPanel" class="hidden">
        <div class="filterSection">
            <span>Mode</span>
            <div class="templateOption" data-mode="A">A</div>
            <div class="templateOption" data-mode="B">B</div>
        </div>
        <div class="filterSection">
            <span>Extra</span>
            <div class="templateOption" id="titleToggle">Title</div>
            <div class="templateOption" id="highlightToggle">Highlight</div>
        </div>
    </div>
    <div id="poem"></div>

    <!-- 先引入词库，再引入主逻辑 -->
    <script src="words.js"></script>
    <script src="main.js"></script>
</body>
</html>
