<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Chance Verse</title>

<style>
/* 重置默认边距（可选，避免浏览器默认样式干扰） */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
    padding-top: 60px;
    padding-left: 10px;   /* 手机端左右留白 */
    padding-right: 10px;
}

button {
    padding: 10px 16px;
    font-size: 16px;
    margin-top: 30px;
    margin-bottom: 90px;
    max-width: 100%;      /* 防止按钮过宽 */
}

#poem {
    width: 100%;          /* 自适应手机宽度 */
    max-width: 400px;     /* 大屏上限400px */
    margin: 0 auto;       /* 居中 */
}

/* 行间距：每行之间留8px，最后一行不留 */
#poem > div:not(:last-child) {
    margin-bottom: 8px;
}

.word {
    display: inline-block;
    background: white;
    color: black;
    padding: 6px 9px;
    margin: 5px;
    font-size: 18px;
    /* transform 已在 JS 中通过行内样式设置，这里可以删除或保留（不影响） */
    /* transform: rotate(calc(-3deg + 6deg * var(--r))); */
}

.highlight {  
    display: inline-block;
    background: white;
    color: black;
    padding: 6px 9px;
    margin: 12px;
    font-size: 18px;
    /* 高亮行同样由 JS 设置 transform，此处可保留或删除 */
}

.author {
    font-size: 14px;        /* 小一点，可按需调整 */
    color: #5a5a5a;            /* 浅灰色（#aaa 是常见浅灰） */
    margin-top: 5px;        /* 与标题的间距 */
    margin-bottom: 5px;    /* 与按钮的间距，可根据实际效果调整 */
    /* 字体继承 body 的 Arial，无需重复声明 */
}
</style>

</head>


<body>

<h1>Chance Verse</h1>

<p class="author">宇尽咸</p>

<button onclick="generatePoem()">Go</button>

<div id="poem"></div>


<script>

const nouns = [
    "余烬", "雷声", "瀑布", "裂缝", "海水", "街道", "花园", "尘埃", 
    "波浪", "火焰", "寂静", "春天", "野草", "月亮", "谎言", "思绪", 
    "宇宙", "空气", "时间", "灵感", "日出", "黄昏", "黎明", "晚霞",
    "玫瑰", "沙滩", "路灯", "光线", "尘埃", "自由", "答案", "春雨",
    "世界", "弹壳", "答案", "春雨", "雨水", "琴键", "落叶", "种子",
    "蜡笔", "梦境", "旋律", "泪水", "希望", "理智", "小狗", "小猫",
    "偏见", "钥匙", "纽扣", "视线", "繁星", "浪潮", "夜空", "欲望",
    "翅膀", "羽毛", "灵魂", "悲痛", "盔甲", "抽屉", "意义", "海洋",
    "灰尘", "焦虑", "未来", "凌晨", "傍晚", "日落", "话语", "湖底",
    "寒风", "风铃", "信封", "伤疤", "暮色", "微风", "城市", "记忆"
]

const verbs = [ // 动词词库，包含动词和形容词
    "跳跃", "沉思", "晃动", "沉默", "漂浮", "遗忘", "喧闹", "燃烧", 
    "灼热", "柔软", "破碎", "亲吻", "迷恋", "模糊", "枯萎", "叹息", 
    "流淌", "闪耀", "落泪", "共鸣", "潮湿", "旋转", "选择", "叛逆", 
    "等待", "逃避", "不朽", "点亮", "扬起", "寻找", "经历", "漂泊", 
    "缠绵", "呼吸", "堂皇", "反思", "打湿", "起身", "承诺", "孤独", 
    "昏暗", "滞后", "思考", "涂画", "嘲弄", "陌生", "消退", "纵容", 
    "惋惜", "倾斜", "呐喊", "等待", "到达", "感激", "约会", "泛滥", 
    "单薄", "残缺", "完整", "修复", "妄想", "书写", "淹没", "灿烂", 
    "拥抱", "暂停", "幻想", "起飞", "走过", "深陷", "挣脱", "眺望", 
    "混淆", "摇摆", "跳舞", "吻别", "喧嚣", "落下", "流动", "指引"
]

const highlights = [
"一种异乎寻常。", "无法停止的本能", "夜晚继续扩张", "一切皆为无物。",
"梦境还是现实？", "几乎消失不见", "时间仿佛被定格", "安静突然来临",
"转瞬即逝的。", "近乎完美。", "点燃世界，扬起灰烬", "小鸟抖落星辰",
"大海的野心", "“去看海吧”", "等待。", "是这样吗？",
"一切照旧。", "声音的颗粒感", "远离纷扰。", "拥抱自由。",
"无动于衷。", "没有什么不可以", "你是否会有所怀念", "LOVE",
"Memory is vivid.", "If it were meant to come.", "It's a joke.", "I guess.",
"拥抱自由", "wind stroking my ears", "I'm losing my mind.", "有天我们会再次相见",
"在世界的尽头", "Let it pour.", "Shadows on the wall hate me.", "I don't know other places.",
"I don't hope for the greatest.", "Can you call me loud.", "天空坠入海洋", "都与我无关。",
"L'amour"
]

function randomHighlight(){
    return highlights[Math.floor(Math.random()*highlights.length)]
}



function generatePoem(){

    const poemDiv = document.getElementById("poem"); 
    poemDiv.innerHTML = ""; // 清空之前的内容

    // 为名词和动词库创建独立的可用池
    let availableNouns = [...nouns];
    let availableVerbs = [...verbs];

    for (let i = 0; i < 4; i++) {
        let line = document.createElement("div");

        // 取一个名词（并移除）
        if (availableNouns.length === 0) break; // 名词不够则停止
        const nounIndex = Math.floor(Math.random() * availableNouns.length);
        const noun = availableNouns[nounIndex];
        availableNouns.splice(nounIndex, 1);

        let spanNoun = document.createElement("span");
        spanNoun.className = "word";
        spanNoun.innerText = noun;
        // 生成随机角度（-2~-1 或 1~2）
        let angle;
        if (Math.random() < 0.5) { //调用随机数
            angle = -2 + Math.random() * 0.9; 
        } else {
            angle = 0.5 + Math.random() * 1.1;   
        }
        spanNoun.style.transform = `rotate(${angle}deg)`; // 直接设置行内样式
        line.appendChild(spanNoun);

        // 取一个动词（并移除）
        if (availableVerbs.length === 0) break; // 动词不够则停止
        const verbIndex = Math.floor(Math.random() * availableVerbs.length);
        const verb = availableVerbs[verbIndex];
        availableVerbs.splice(verbIndex, 1);

        let spanVerb = document.createElement("span");
        spanVerb.className = "word";
        spanVerb.innerText = verb;
        // 重新生成随机角度（每个词块独立）
        if (Math.random() < 0.5) {
            angle = -2 + Math.random() * 0.8;
        } else {
            angle = 0.5 + Math.random() * 1.1;
        }
        spanVerb.style.transform = `rotate(${angle}deg)`;
        line.appendChild(spanVerb);

        poemDiv.appendChild(line); 
    }

     if (Math.random() < 0.6) {   // 可将0.5改为其他值调整概率。第五行highlight随机出现。
        let line = document.createElement("div");
        let span = document.createElement("span");
        span.className = "highlight";
        span.innerText = randomHighlight();

        // 设置与前四行相同的随机角度
        let angle;
        if (Math.random() < 0.5) {
            angle = -1.6 + Math.random() * 0.8;  // 范围约 -2 ~ -0.9
        } else {
            angle = 0.5 + Math.random() * 1.1; // 范围约 0.5 ~ 1.6
        }
        span.style.transform = `rotate(${angle}deg)`;
        
        line.appendChild(span);
        poemDiv.appendChild(line);
    }

}

</script>


</body>
</html>
