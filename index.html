<title>拼贴诗生成器</title> 

<style>
body{
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
    padding-top:40px;
}

button{
    padding:10px 16px;
    font-size:16px;
    margin-bottom:90px;
}

#poem{
    width:400px;
    margin:0 auto;
}

#poem > div:not(:last-child) {
    margin-bottom: 8px;
}

.word{
    display:inline-block;
    background:white;
    color:black;
    padding:6px 9px;
    margin:5px;
    font-size:18px;
    transform:rotate(calc(-3deg + 6deg * var(--r)));
}

.highlight{  
    display:inline-block;
    background:white;
    color:black;
    padding:6px 9px;
    margin:20px;
    font-size:18px;
    transform:rotate(calc(-3deg + 6deg * var(--r)));
}

</style>

</head>


<body>

<h1>拼贴诗生成器</h1>

<button onclick="generatePoem()">生成</button>

<div id="poem"></div>


<script>

const nouns = [
    "余烬", "雷声", "瀑布", "裂缝", 
    "海水", "街道", "花园", "尘埃", 
    "波浪", "火焰", "寂静", "春天", 
    "野草", "月亮", "谎言", "思绪"
]

const verbs = [ // 动词词库，包含动词和形容词
    "跳跃", "沉思", "晃动", "沉默", 
    "漂浮", "遗忘", "喧闹", "燃烧", 
    "灼烧", "柔软", "破碎", "亲吻", 
    "迷恋", "模糊", "枯萎", "叹息", 
    "流淌", "闪耀", "流泪", "共鸣", 
    "潮湿"
]

const highlights = [
"现实中的狂欢",
"制度上的裂缝",
"理论突然崩塌",
"夜晚继续扩张"
]

function randomWord(){
    return words[Math.floor(Math.random()*words.length)]
}

function randomHighlight(){
    return highlights[Math.floor(Math.random()*highlights.length)]
}

function generatePoem(){

    const poemDiv = document.getElementById("poem"); 
    poemDiv.innerHTML = ""; // 清空之前的内容

    // 为名词和动词库创建独立的可用池
    let availableNouns = [...nouns];
    let availableVerbs = [...verbs];

    for (let i = 0; i < 4; i++) {
        let line = document.createElement("div");

        // 取一个名词（并移除）
        if (availableNouns.length === 0) break; // 名词不够则停止
        const nounIndex = Math.floor(Math.random() * availableNouns.length);
        const noun = availableNouns[nounIndex];
        availableNouns.splice(nounIndex, 1);

        let spanNoun = document.createElement("span");
        spanNoun.className = "word";
        spanNoun.innerText = noun;
        // 生成随机角度（-2~-1 或 1~2）
        let angle;
        if (Math.random() < 0.5) { //调用随机数
            angle = -2 + Math.random() * 0.9; 
        } else {
            angle = 0.5 + Math.random() * 1.1;   
        }
        spanNoun.style.transform = `rotate(${angle}deg)`; // 直接设置行内样式
        line.appendChild(spanNoun);

        // 取一个动词（并移除）
        if (availableVerbs.length === 0) break; // 动词不够则停止
        const verbIndex = Math.floor(Math.random() * availableVerbs.length);
        const verb = availableVerbs[verbIndex];
        availableVerbs.splice(verbIndex, 1);

        let spanVerb = document.createElement("span");
        spanVerb.className = "word";
        spanVerb.innerText = verb;
        // 重新生成随机角度（每个词块独立）
        if (Math.random() < 0.5) {
            angle = -2 + Math.random() * 1.1;
        } else {
            angle = 0.5 + Math.random() * 1.1;
        }
        spanVerb.style.transform = `rotate(${angle}deg)`;
        line.appendChild(spanVerb);

        poemDiv.appendChild(line); 
    }

    /* 第五行的highlight停用
     for(let i=4;i<5;i++){ // 第五行

        let line=document.createElement("div")

        for(let j=0;j<1;j++){ // 第五行只有一个词

            let span=document.createElement("span")
            span.className="highlight"
            span.innerText=randomHighlight()

            span.style.setProperty("--r",Math.random()) // 行内的旋转角度改这里

            line.appendChild(span)
        }

        poemDiv.appendChild(line)
    }
    */ 

}

</script>


</body>
</html>
